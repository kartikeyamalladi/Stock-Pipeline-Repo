x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "stock-pipeline-dev-secret"
    AIRFLOW_UID: ${AIRFLOW_UID:-501}
    PYTHONPATH: /opt/airflow
    ALPHA_VANTAGE_API_KEY: ${ALPHA_VANTAGE_API_KEY}
    FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    SPARK_MASTER_URL: spark://spark-master:7077
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../ingestion:/opt/airflow/ingestion
    - ../processing:/opt/airflow/processing
    - ../config:/opt/airflow/config
    - ../data:/opt/airflow/data
    - airflow-db:/opt/airflow
  depends_on:
    postgres:
      condition: service_healthy

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command: bash -c "airflow db migrate && airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  spark-master:
    image: apache/spark:3.5.0
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
      SPARK_MASTER_WEBUI_PORT: 8081
    ports:
      - "7077:7077"
      - "8081:8081"
    volumes:
      - ../data:/opt/airflow/data
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_WEBUI_PORT: 8082
    ports:
      - "8082:8082"
    volumes:
      - ../data:/opt/airflow/data
    depends_on:
      - spark-master
    restart: unless-stopped

volumes:
  airflow-db:
  postgres-db:
